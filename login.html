<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar no Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-xl p-8 shadow-2xl">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-white tracking-tight">🔬 Nexus Mundi</h1>
            <p class="text-xs text-gray-400 mt-1">Insira as credenciais para acessar o monitor geopolítico</p>
        </div>

        {% if form.errors %}
        <div class="mb-4 p-3 rounded bg-red-950/50 border border-red-900 text-xs text-red-400">
            Usuário ou senha incorretos. Por favor, tente novamente.
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="id_username" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Usuário</label>
                <input type="text" name="username" id="id_username" required 
                       class="w-full bg-gray-950 border border-gray-800 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 transition">
            </div>

            <div>
                <label for="id_password" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Senha</label>
                <input type="password" name="password" id="id_password" required 
                       class="w-full bg-gray-950 border border-gray-800 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 transition">
            </div>

            <button type="submit" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm py-2 px-4 rounded transition shadow-lg shadow-emerald-900/20">
                Entrar no Sistema
            </button>
        </form>

    </div>

</body>
</html>
