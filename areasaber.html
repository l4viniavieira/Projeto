{% extends 'base.html' %}

{% block conteudo %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white tracking-tight">Grandes Áreas do Saber Geopolítico</h1>
    <p class="text-sm text-gray-400 mt-1">Divisão metodológica e campos teóricos integrados na plataforma.</p>
</div>

<div class="relative overflow-x-auto shadow-md sm:rounded-lg border border-gray-800">
    <table class="w-full text-sm text-left text-gray-400">
        <thead class="text-xs uppercase bg-gray-800 text-gray-400 border-b border-gray-700">
            <tr>
                <th scope="col" class="px-6 py-3">Nome da Área (Ex: Economia, Conflitos, Social)</th>
            </tr>
        </thead>
        <tbody>
            {% for area in areas_saber %}
            <tr class="bg-gray-900 border-b border-gray-800 hover:bg-gray-850 transition">
                <td class="px-6 py-4 font-semibold text-white">
                    {{ area.nome }}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock conteudo %}
